# Endpoints to check against the mdrepo web application.
# Run with:
#   mdr-webcheck --url localhost --port 80
#   mdr-webcheck --url staging.mdrepo.org
#   mdr-webcheck --url mdrepo.org
#
# Endpoints with no "host" field are checked against every host.
# Endpoints with a "host" field are only checked for that host.

# --------------------------------------------------
# User Interface
# --------------------------------------------------

#
# Home page
#
[[endpoints]]
path = "/"
contains = ["MDRepo is an open repository of MD simulations for proteins"]

#
# Simulation list
#
[[endpoints]]
path = "/explore"
contains = ["Found"]

#
# Simulation view
#
[[endpoints]]
host = "localhost"
path = "/explore/MDR00016143"
contains = ["8 ns simulation of the 5gid PDB entry (P13053)"]

[[endpoints]]
host = "mdrepo.org"
path = "/explore/4438"
contains = ["Adaptive sampling of AncFT luciferase"]

[[endpoints]]
host = "staging.mdrepo.org"
path = "/explore/MDR00000137"
contains = ["8 ns simulation of the 1k1n PDB entry (P00760)"]

#
# Uniprot list
#
[[endpoints]]
path = "/uniprot/list"
contains = ["Found"]

#
# Uniprot view
#
[[endpoints]]
host = "localhost"
path = "/uniprot/view/A0A023J4Z7"
contains = ["Pre-glycoprotein polyprotein GP complex"]

[[endpoints]]
host = "staging.mdrepo.org"
path = "/uniprot/view/A0A024E3Q2"
contains = ["Neuraminidase"]

[[endpoints]]
host = "mdrepo.org"
path = "/uniprot/view/A0A023J4Z7"
contains = ["Pre-glycoprotein polyprotein GP complex"]

#
# PDB list
#
[[endpoints]]
path = "/pdb/list"
contains = ["Found"]

#
# PDB view
#
[[endpoints]]
host = "localhost"
path = "/pdb/view/10gs"
contains = ["HUMAN GLUTATHIONE S-TRANSFERASE P1-1, COMPLEX WITH TER117"]

[[endpoints]]
host = "mdrepo.org"
path = "/pdb/view/10gs"
contains = ["HUMAN GLUTATHIONE S-TRANSFERASE P1-1, COMPLEX WITH TER117"]

[[endpoints]]
host = "stagingmdrepo.org"
path = "/pdb/view/1a7x"
contains = ["FKBP12-FK1012 COMPLEX"]

#
# Pub list
#
[[endpoints]]
path = "/pub/list"
contains = ["Found"]

#
# Pub view
#
[[endpoints]]
host = "localhost"
path = "/pub/view/106"
contains = ["10.1016/j.cell.2020.01.008"]

[[endpoints]]
host = "mdrepo.org"
path = "/pub/view/153"
contains = ["10.48550/arXiv.2504.18367"]

[[endpoints]]
host = "staging.mdrepo.org"
path = "/pub/view/13"
contains = ["10.48550/arXiv.2504.18367"]

#
# About
#
[[endpoints]]
path = "/about"
contains = ["What is MDRepo?"]

#
# FAQ
#
[[endpoints]]
path = "/faq"
contains = ["Is it safe to store my data here?"]

# The following pages require a logged-in user. When running with --admin-token
# the browser session is authenticated before these checks run.

#
# Metadata creation
#
[[endpoints]]
host = "localhost"
path = "/metadata"
contains = ["Metadata Generator"]

[[endpoints]]
host = "mdrepo.org"
path = "/metadata"
contains = ["Metadata Generator"]

#
# User profile
#
[[endpoints]]
path = "/profile"
contains = ["Update User Profile"]

#
# My simulations
#
[[endpoints]]
path = "/my-simulations"
contains = ["Found"]

#
# Downloads
#
[[endpoints]]
path = "/downloads"
contains = ["Downloads"]

#
# Upload logs
#
[[endpoints]]
path = "/upload-logs"
contains = ["Upload History"]

#
# Upload tokens
#
[[endpoints]]
path = "/upload-tokens"
contains = ["Upload Tokens"]

#
# Admin — simulation approval
#
[[endpoints]]
path = "/admin"
contains = ["Found"]

#
# Admin — user list
#
[[endpoints]]
path = "/admin/users"
contains = ["Found"]

#
# Admin — import warnings
#
[[endpoints]]
path = "/admin/import-warning"
contains = ["Warning"]


# --------------------------------------------------
# API — Public (no authentication required)
# --------------------------------------------------

#
# Simulation list
#
[[endpoints]]
path = "/api/v1/simulation_list"
browser = false

  [[endpoints.json_checks]]
  path = "count"
  gt = 0

#
# Simulation view
#
[[endpoints]]
host = "localhost"
path = "/api/v1/simulation_view/16143"
browser = false

  [[endpoints.json_checks]]
  path = "slug"
  eq = "MDR00016143"

[[endpoints]]
host = "staging.mdrepo.org"
path = "/api/v1/simulation_view/556"
browser = false

  [[endpoints.json_checks]]
  path = "slug"
  eq = "MDR00000556"

  [[endpoints.json_checks]]
  path = "short_description"
  contains = "5ht2b receptor"

[[endpoints]]
host = "mdrepo.org"
path = "/api/v1/simulation_view/21597"
browser = false

  [[endpoints.json_checks]]
  path = "slug"
  eq = "MDR00021597"

  [[endpoints.json_checks]]
  path = "short_description"
  eq = "EHMT1 ankyrin repeat domain V786L variant"

#
# Simulation IDs only (no pagination — returns array directly)
#
[[endpoints]]
path = "/api/v1/simulation_list_ids_only"
browser = false

  [[endpoints.json_checks]]
  path = "[0].id"
  exists = true

  [[endpoints.json_checks]]
  path = "[0].slug"
  exists = true

#
# Random simulation (no pagination — returns array with one item)
#
[[endpoints]]
path = "/api/v1/random_simulation"
browser = false

  [[endpoints.json_checks]]
  path = "[0].id"
  exists = true

  [[endpoints.json_checks]]
  path = "[0].slug"
  exists = true

#
# Uniprot list
#
[[endpoints]]
path = "/api/v1/uniprot_list"
browser = false

  [[endpoints.json_checks]]
  path = "count"
