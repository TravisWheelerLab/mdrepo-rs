# Ephemeral Postgres for the mdr-db integration tests.
#
#   docker compose -f mdr-db/tests/docker-compose.yml up -d --wait
#
# Data lives on tmpfs, so the container holds no state between runs and is wiped
# on `down`. Port 55432 avoids clashing with a local Postgres on 5432.
# Connection string used by the tests:
#   TEST_DATABASE_URL=postgres://mdr:mdr@localhost:55432/mdr_test
services:
  testdb:
    image: postgres:16
    environment:
      POSTGRES_USER: mdr
      POSTGRES_PASSWORD: mdr
      POSTGRES_DB: mdr_test
    ports: ["55432:5432"]
    tmpfs: ["/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdr -d mdr_test"]
      interval: 1s
      timeout: 3s
      retries: 30
